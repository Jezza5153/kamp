name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Hard gates — must pass.
      - run: npm test
      - run: npm run build
      # Non-blocking until pre-existing Next 16 lint debt is cleared (tracked separately).
      - run: npm run lint
        continue-on-error: true
